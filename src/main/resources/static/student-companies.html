<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profiles | IARE AI Placement Portal</title>
    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/student-companies.css">
</head>
<body class="student-companies-page" data-portal-role="student">
    <div class="scroll-progress" id="scrollProgress"></div>

    <main class="main">
        <header class="statistics-page-header">
            <a class="back-btn" id="companiesBackBtn" href="/student-dashboard">
                <i data-lucide="arrow-left"></i>
                <span>Back</span>
            </a>
            <div class="header-title-block">
                <h1>COMPANIES</h1>
            </div>
        </header>

        <section class="controls-section">
            <div class="search-bar-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search by company name...">
            </div>

            <div class="filters-row">
                <div class="select-wrap">
                    <select id="typeFilter">
                        <option value="">All Types</option>
                    </select>
                </div>
                <div class="select-wrap">
                    <select id="industryFilter">
                        <option value="">All Industries</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="results-header">
            <div class="results-count">
                <span id="companyCount">0</span> profiles found
            </div>
            <div class="pagination-controls">
                <span id="companiesInlineLoading" class="inline-loading-indicator hidden" aria-hidden="true">
                    <span class="inline-loading-dot"></span>
                    <span class="inline-loading-dot"></span>
                    <span class="inline-loading-dot"></span>
                </span>
                <button id="companiesPrevButton" class="pagination-btn" type="button">Previous</button>
                <span id="companiesPageInfo" class="pagination-info">Page 0 of 0</span>
                <button id="companiesNextButton" class="pagination-btn" type="button">Next</button>
            </div>
        </div>

        <section>
            <div id="studentCompaniesLoading" class="cards-grid loading-skeleton-grid" aria-hidden="true"></div>

            <div class="cards-grid" id="companiesGrid"></div>

            <div id="studentCompaniesEmpty" class="empty-state hidden">
                <i data-lucide="building-2"></i>
                <h3>No companies found</h3>
                <p>Try adjusting your search filters.</p>
            </div>
        </section>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/student-companies.js"></script>
</body>
</html>
