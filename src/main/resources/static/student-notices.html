<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Notices | IARE AI Placement Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/student-notices.css">
    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
</head>
<body class="student-notices-page" data-portal-role="student">
<div class="scroll-progress" id="scrollProgress"></div>

<main class="notices-main">
    <header class="statistics-page-header">
        <a class="back-btn" id="noticesBackBtn" href="/student-dashboard">
            <i data-lucide="arrow-left"></i>
            <span>Back</span>
        </a>
        <div class="header-title-block">
            <h1>NOTICES</h1>
        </div>
    </header>

    <section>
        <div class="results-header">
            <div class="results-count">
                <span id="noticeCount">0</span> notices found
            </div>
            <div class="pagination-controls">
                <button id="noticesPrevButton" class="pagination-btn" type="button">Previous</button>
                <span id="noticesPageInfo" class="pagination-info">Page 0 of 0</span>
                <button id="noticesNextButton" class="pagination-btn" type="button">Next</button>
            </div>
        </div>
        <div id="studentNoticesLoading" class="loading-skeleton-list">
            <article class="notice-card-skeleton"></article>
            <article class="notice-card-skeleton"></article>
            <article class="notice-card-skeleton"></article>
            <article class="notice-card-skeleton"></article>
            <article class="notice-card-skeleton"></article>
        </div>
        <div id="studentNoticesList" class="notices-list"></div>
        <div id="studentNoticesEmpty" class="notice-empty-state hidden">
            No active notices right now. Please check again later.
        </div>
    </section>
</main>

<script src="/js/auth.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/student-notices.js"></script>
</body>
</html>
